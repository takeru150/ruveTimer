<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ルベランタイマー Web</title>
    <style>
        body {
            margin: 0; font-family: sans-serif; background: white;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow-x: hidden; overflow-y: auto; touch-action: manipulation;
            position: relative;
        }
        /* 左上のキャラアイコン（サイズを130pxに拡大） */
        #kapa-icon {
            position: absolute; 
            top: 5px; 
            left: 5px;
            width: 130px; /* ここを大きくしました */
            height: auto; 
            object-fit: contain; 
            z-index: 100;
            pointer-events: none; /* 画像がボタン操作の邪魔をしないように設定 */
        }
        /* 安置情報テキスト */
        #safety-text {
            height: 45px; font-size: 32px; font-weight: 900; 
            margin-top: 10px; color: #444; text-align: center;
        }
        /* カウントダウン表示エリア */
        #circle-area {
            position: relative; width: 320px; height: 320px;
            display: flex; justify-content: center; align-items: center;
            margin-top: 5px;
        }
        #layer-canvas {
            position: absolute; top: 0; left: 0; z-index: -1;
        }
        #timer-text {
            font-size: 140px; font-weight: 900; font-family: monospace;
            background: linear-gradient(to bottom, #00fbff, #007fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 0px black); z-index: 10;
            text-align: center; width: 100%; pointer-events: none;
        }
        .stripe-bg {
            background: repeating-linear-gradient(-45deg, #E57373, #E57373 70px, #66BB6A 70px, #66BB6A 140px) !important;
        }
        /* ボタンエリア */
        .btn-row { display: flex; width: 92%; gap: 10px; height: 150px; margin-top: 15px; }
        button { border: 4px solid black; border-radius: 28px; font-weight: bold; cursor: pointer; }
        
        .circle-btn { flex: 4; background: linear-gradient(#4A148C, #7B1FA2); color: white; font-size: 15px; }
        .grand-btn { flex: 6; background: linear-gradient(#0D47A1, #1976D2); color: white; font-size: 16px; }
        .stop-btn { width: 160px; height: 60px; background: gray; color: white; font-size: 22px; margin: 15px 0; }
        
        /* 音量調節エリア */
        #volume-area { width: 80%; display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        #volume-slider { flex-grow: 1; cursor: pointer; height: 20px; }

        .re-adjust { width: 92%; height: 75px; margin-bottom: 8px; color: white; font-size: 18px; border-radius: 16px; }
        .red-btn { background: #E57373; }
        .yellow-btn { background: #FFEB3B; color: black; }
    </style>
</head>
<body>

    <!-- キャラアイコン -->
    <img id="kapa-icon" src="kapa.png" alt="kapa">

    <div id="safety-text"></div>

    <div id="circle-area">
        <canvas id="layer-canvas" width="320" height="320"></canvas>
        <div id="timer-text">0</div>
    </div>

    <div class="btn-row">
        <button class="circle-btn" onclick="handleCircleClick()">サークルカラミティの<br>ふきだしが出たら押す</button>
        <button class="grand-btn" onclick="handleGrandClick()">グランドカラミティの<br>ふきだしが出たら押す</button>
    </div>

    <button class="stop-btn" onclick="resetAll()">STOP</button>

    <!-- 音量調節バー -->
    <div id="volume-area">
        <span style="font-size: 14px; font-weight: bold;">音量</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1" oninput="updateVolume(this.value)">
    </div>

    <button class="re-adjust red-btn" onclick="handleAdjustClick(false, false)">再調整（赤床が出たら押す）</button>
    <button class="re-adjust yellow-btn" onclick="handleAdjustClick(true, false)">再調整（黄床が出たら押す）</button>

    <script>
        let timeLeft = 0;
        let timerId = null;
        let isRunning = false;
        let currentIsA = true; 
        let safetyText = "";
        let currentSoundType = "G"; 

        // 音声定義
        const audioAka = new Audio('aka321.wav');
        const audioKiiro = new Audio('kiiro321.wav');
        const audioA = new Audio('a321.wav');
        const audioB = new Audio('b321.wav');
        const audioC = new Audio('c321.wav');
        const allAudios = [audioAka, audioKiiro, audioA, audioB, audioC];

        function updateVolume(val) {
            allAudios.forEach(a => a.volume = val);
        }

        function unlockAudio() {
            allAudios.forEach(a => {
                a.muted = true;
                a.play().then(() => {
                    a.pause();
                    a.currentTime = 0;
                    a.muted = false;
                }).catch(() => {});
            });
        }

        function handleGrandClick() { unlockAudio(); startTimer(true, true); }
        function handleCircleClick() { unlockAudio(); startCircleCalamityTimer(); }
        function handleAdjustClick(a, b) { unlockAudio(); startTimer(a, b); }

        function createGridPattern() {
            const pCanvas = document.createElement('canvas');
            const pCtx = pCanvas.getContext('2d');
            pCanvas.width = 12; pCanvas.height = 12;
            pCtx.strokeStyle = "rgba(0,0,0,0.4)"; pCtx.lineWidth = 1;
            pCtx.beginPath();
            pCtx.moveTo(0, 0); pCtx.lineTo(12, 12);
            pCtx.moveTo(12, 0); pCtx.lineTo(0, 12);
            pCtx.stroke();
            return pCanvas;
        }

        function drawRange(ctx, centerX, centerY, maxRadius, startPer, endPer, color, isGrid = false) {
            const innerR = maxRadius * (startPer / 100);
            const outerR = maxRadius * (endPer / 100);
            ctx.beginPath();
            ctx.arc(centerX, centerY, outerR, 0, Math.PI * 2);
            ctx.arc(centerX, centerY, innerR, 0, Math.PI * 2, true);
            ctx.fillStyle = color;
            ctx.fill();
            if (isGrid) {
                const gridPattern = ctx.createPattern(createGridPattern(), 'repeat');
                ctx.fillStyle = gridPattern; ctx.fill();
            }
        }

        function drawDynamicCircles() {
            const canvas = document.getElementById('layer-canvas');
            const ctx = canvas.getContext('2d');
            if(!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!isRunning || currentIsA) return;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const maxRadius = 158;
            const yellowColor = "#FFEB3B";
            const safeGreen = "#E8F5E9";

            ctx.beginPath(); ctx.arc(centerX, centerY, maxRadius, 0, Math.PI * 2);
            ctx.fillStyle = safeGreen; ctx.fill();

            if (currentSoundType === 'A') {
                drawRange(ctx, centerX, centerY, maxRadius, 0, 15, yellowColor); 
                drawRange(ctx, centerX, centerY, maxRadius, 30, 50, yellowColor, true); 
                drawRange(ctx, centerX, centerY, maxRadius, 65, 80, yellowColor); 
            } else if (currentSoundType === 'B') {
                drawRange(ctx, centerX, centerY, maxRadius, 20, 35, yellowColor); 
                drawRange(ctx, centerX, centerY, maxRadius, 50, 65, yellowColor); 
                drawRange(ctx, centerX, centerY, maxRadius, 80, 95, yellowColor); 
            } else if (currentSoundType === 'C') {
                drawRange(ctx, centerX, centerY, maxRadius, 35, 65, yellowColor); 
                drawRange(ctx, centerX, centerY, maxRadius, 90, 100, yellowColor); 
            }

            ctx.beginPath(); ctx.arc(centerX, centerY, maxRadius * 0.15, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(0,0,0,0.8)"; ctx.lineWidth = 2; ctx.stroke();
            drawRange(ctx, centerX, centerY, maxRadius, 30, 50, "rgba(0,0,0,0.05)", true);
            ctx.beginPath(); ctx.arc(centerX, centerY, maxRadius, 0, Math.PI * 2);
            ctx.strokeStyle = "black"; ctx.lineWidth = 2; ctx.stroke();
        }

        function updateUI() {
            document.getElementById('timer-text').innerText = (isRunning && timeLeft > 0) ? Math.ceil(timeLeft) : "0";
            document.getElementById('safety-text').innerText = safetyText;
            if (isRunning && currentIsA) { document.body.classList.add("stripe-bg"); } 
            else { document.body.classList.remove("stripe-bg"); }
            drawDynamicCircles();
        }

        function resetAll() {
            clearInterval(timerId); isRunning = false; timeLeft = 0; safetyText = ""; updateUI();
        }

        function startTimer(startWithA, isFirst) {
            resetAll(); isRunning = true; safetyText = ""; currentIsA = startWithA; currentSoundType = "G";
            let firstCycle = isFirst;
            const runCycle = () => {
                let duration = firstCycle ? 6 : 23;
                firstCycle = false; timeLeft = duration;
                let warningPlayed = false;
                timerId = setInterval(() => {
                    timeLeft -= 0.016;
                    if (timeLeft <= 5 && !warningPlayed) {
                        currentIsA ? audioAka.play() : audioKiiro.play();
                        warningPlayed = true;
                    }
                    if (timeLeft <= 0) {
                        clearInterval(timerId); currentIsA = !currentIsA; runCycle();
                    }
                    updateUI();
                }, 16);
            };
            runCycle();
        }

        function startCircleCalamityTimer() {
            resetAll(); isRunning = true; currentIsA = false; 
            const sequence = [
                {t:21, s:'A', m:'線上安置'}, {t:24, s:'A', m:'線上安置'}, 
                {t:21, s:'B', m:'金網安置'}, {t:23, s:'A', m:'線上安置'}, 
                {t:21, s:'C', m:'外周真ん中安置'}, {t:24, s:'B', m:'金網安置'}
            ];
            let idx = 0; let isVeryFirst = true;
            const runCircleStep = () => {
                let step = sequence[idx];
                currentSoundType = step.s;
                timeLeft = (isVeryFirst && idx === 0) ? 5 : step.t;
                safetyText = step.m;
                let warningPlayed = false;
                timerId = setInterval(() => {
                    timeLeft -= 0.016;
                    if (timeLeft <= 5 && !warningPlayed) {
                        if(step.s === 'A') audioA.play();
                        if(step.s === 'B') audioB.play();
                        if(step.s === 'C') audioC.play();
                        warningPlayed = true;
                    }
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        idx = (idx + 1) % sequence.length;
                        if(idx === 0) isVeryFirst = false;
                        runCircleStep();
                    }
                    updateUI();
                }, 16);
            };
            runCircleStep();
        }
    </script>
</body>
</html>
