<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ルベランタイマー Web</title>
    <style>
        body {
            margin: 0; font-family: sans-serif; background: white;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow-y: auto; touch-action: manipulation;
        }
        /* 安置情報テキスト（画面最上部） */
        #safety-text {
            height: 50px; font-size: 32px; font-weight: 900; 
            margin-top: 10px; color: #444; text-align: center;
        }
        /* カウントダウン表示エリア */
        #circle-area {
            position: relative; width: 320px; height: 320px;
            display: flex; justify-content: center; align-items: center;
            margin-top: 10px;
        }
        .yellow-circle {
            position: absolute; width: 220px; height: 220px;
            border-radius: 50%; border: 15px solid black;
            outline: 60px solid #FFFFEB; z-index: -1;
        }
        .yellow-circle-inner {
            position: absolute; width: 140px; height: 140px;
            border-radius: 50%; border: 12px solid black; z-index: -1;
        }
        #timer-text {
            font-size: 140px; font-weight: 900; font-family: monospace;
            background: linear-gradient(to bottom, #FFF176, #FF9800);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 0px black); z-index: 10;
        }
        /* 背景ストライプ */
        .stripe-bg {
            background: repeating-linear-gradient(-45deg, #E57373, #E57373 70px, #66BB6A 70px, #66BB6A 140px) !important;
        }
        /* ボタンエリア */
        .btn-row { display: flex; width: 92%; gap: 10px; height: 160px; margin-top: 10px; }
        button { border: 4px solid black; border-radius: 28px; font-weight: bold; cursor: pointer; }
        
        .circle-btn { flex: 4; background: linear-gradient(#4A148C, #7B1FA2); color: white; font-size: 15px; }
        .grand-btn { flex: 6; background: linear-gradient(#0D47A1, #1976D2); color: white; font-size: 16px; }
