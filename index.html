<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ルベランタイマー Pro</title>

    <!-- アイコン設定 -->
    <link rel="icon" href="kapa.png">
    <link rel="apple-touch-icon" href="kapa.png">

    <style>
        :root {
            --bg-color: #f8f9fa;
            --border-color: #222;
        }
        body {
            margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg-color);
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow-x: hidden; overflow-y: auto; touch-action: manipulation;
            position: relative;
        }

        #safety-text {
            height: 40px; font-size: 26px; font-weight: 900; 
            margin-top: 12px; color: #222; text-align: center;
            letter-spacing: 1px; text-shadow: 1px 1px 0px white;
        }
        
        #step-counter {
            height: 20px; font-size: 14px; font-weight: bold; color: #888;
            margin-bottom: 5px;
        }

        /* タイマーと微調整ボタンを横に並べるコンテナ */
        .timer-container {
            display: flex; align-items: center; justify-content: center; 
            width: 100%; gap: 5px; margin-top: 5px;
        }

        #circle-area {
            position: relative; width: 260px; height: 260px; /* 少しサイズ調整 */
            display: flex; justify-content: center; align-items: center;
        }
        #layer-canvas { position: absolute; top: 0; left: 0; z-index: -1; }
        #timer-text {
            font-size: 120px; font-weight: 900; font-family: 'Courier New', Courier, monospace;
            background: linear-gradient(to bottom, #00fbff, #007fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 0px black);
            z-index: 10; text-align: center; width: 100%; pointer-events: none;
        }

        /* 円形アイコンボタン (微調整用) */
        .icon-adj-btn {
            width: 55px; height: 55px; border-radius: 50%;
            background: #fff; color: #444; font-size: 22px;
            border: 3px solid #ccc; box-shadow: 0 4px 0 #999;
            display: flex; align-items: center; justify-content: center;
            z-index: 100; flex-shrink: 0;
        }
        .icon-adj-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #999; }
        
        .pulse { animation: pulse-animation 0.5s infinite; }
        @keyframes pulse-animation {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .stripe-bg {
            background: repeating-linear-gradient(-45deg, #ff8a80, #ff8a80 60px, #81c784 60px, #81c784 120px) !important;
        }
        
        button { 
            border: 3px solid var(--border-color); 
            border-radius: 20px; font-weight: bold; cursor: pointer; 
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 4px 0 #000;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }

        .btn-row { display: flex; width: 94%; gap: 10px; height: 110px; margin-top: 15px; }
        .circle-btn { flex: 1; background: linear-gradient(#6a1b9a, #4a148c); color: white; font-size: 14px; }
        .grand-btn { flex: 1; background: linear-gradient(#1565c0, #0d47a1); color: white; font-size: 14px; }
        
        .fixed-spacer { height: 20px; }

        .forgot-section {
            width: 96%; background: rgba(0,0,0,0.05); border-radius: 25px; 
            padding: 10px 0; display: flex; flex-direction: column; align-items: center;
        }
        .forgot-header { font-size: 13px; font-weight: 900; color: #555; margin-bottom: 8px; }
        .forgot-row { display: flex; width: 94%; gap: 8px; height: 70px; }
        .forgot-btn { flex: 1; font-size: 11px; border-radius: 15px; box-shadow: 0 3px 0 #000; }
        .c-f-btn { background: linear-gradient(#ffa726, #fb8c00); color: white; border-color: #ef6c00; }
        .g-f-red { background: linear-gradient(#ef5350, #c62828); color: white; border-color: #b71c1c; }
        .g-f-yellow { background: linear-gradient(#fdd835, #fbc02d); color: #333; border-color: #f9a825; }

        .stop-panel { display: flex; align-items: center; justify-content: center; margin: 15px 0 10px 0; width: 100%; }
        .stop-btn { width: 150px; height: 55px; background: linear-gradient(#9e9e9e, #616161); color: white; font-size: 20px; }
        
        #volume-area { width: 85%; display: flex; align-items: center; gap: 15px; margin-top: 5px; }
        #volume-slider { flex-grow: 1; cursor: pointer; height: 10px; accent-color: #2196F3; }

        #credit { font-size: 10px; color: #aaa; padding: 15px 0; text-align: center; }
    </style>
</head>
<body onclick="requestWakeLock()" ontouchstart="requestWakeLock()">

    <div id="safety-text"></div>
    <div id="step-counter"></div>

    <!-- カウントダウン左右にボタンを配置 -->
    <div class="timer-container">
        <button class="icon-adj-btn" onclick="adjustTime(1)">≪</button>
        
        <div id="circle-area">
            <canvas id="layer-canvas" width="260" height="260"></canvas>
            <div id="timer-text">0</div>
        </div>
        
        <button class="icon-adj-btn" onclick="adjustTime(-1)">≫</button>
    </div>

    <div class="btn-row">
        <button class="circle-btn" onclick="handleCircleClick()">サークルカラミティの<br>ふきだしが出たら押す</button>
        <button class="grand-btn" onclick="handleGrandClick()">グランドカラミティの<br>ふきだしが出たら押す</button>
    </div>

    <div class="fixed-spacer"></div>

    <div class="forgot-section">
        <div class="forgot-header">⚠️ 押し忘れ時の同期</div>
        <div class="forgot-row">
            <button class="forgot-btn c-f-btn" onclick="handleCircleForgotClick()">サークル<br>(黄床で押す)</button>
            <button class="forgot-btn g-f-red" onclick="handleGrandForgotClick(false)">グランド<br>(赤床で押す)</button>
            <button class="forgot-btn g-f-yellow" onclick="handleGrandForgotClick(true)">グランド<br>(黄床で押す)</button>
        </div>
    </div>

    <div class="stop-panel">
        <button class="stop-btn" onclick="resetAll()">■ STOP</button>
    </div>

    <div id="volume-area">
        <span style="font-size: 12px; font-weight: bold; color: #888;">VOL</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1" oninput="updateVolume(this.value)">
    </div>

    <div id="credit">音声にはVOICEVOXを使用しています</div>

    <script>
        let timeLeft = 0;
        let timerId = null;
        let isRunning = false;
        let currentIsA = true; 
        let safetyText = "";
        let currentSoundType = "G"; 
        let wakeLock = null;

        const audioAka = new Audio('aka321.wav');
        const audioKiiro = new Audio('kiiro321.wav');
        const audioA = new Audio('a321.wav');
        const audioB = new Audio('b321.wav');
        const audioC = new Audio('c321.wav');
        const allAudios = [audioAka, audioKiiro, audioA, audioB, audioC];

        async function requestWakeLock() {
            if (wakeLock !== null) return;
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeLock.addEventListener('release', () => { wakeLock = null; });
                }
            } catch (err) {}
        }

        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible') { await requestWakeLock(); }
        });

        function updateVolume(val) { allAudios.forEach(a => a.volume = val); }

        function unlockAudio() {
            allAudios.forEach(a => {
                a.muted = true;
                a.play().then(() => { a.pause(); a.currentTime = 0; a.muted = false; }).catch(() => {});
            });
        }

        function adjustTime(amount) {
            if (!isRunning) return;
            timeLeft += amount;
            if (timeLeft < 0) timeLeft = 0;
            updateUI();
        }

        function handleGrandClick() { unlockAudio(); startTimer(true, true); }
        function handleCircleClick() { unlockAudio(); startCircleCalamityTimer(); }
        function handleAdjustClick(a, b) { unlockAudio(); startTimer(a, b); }
        function handleCircleForgotClick() { unlockAudio(); startCircleForgotTimer(); }
        function handleGrandForgotClick(startWithA) { unlockAudio(); startGrandForgotTimer(startWithA); }

        function createGridPattern() {
            const pCanvas = document.createElement('canvas');
            const pCtx = pCanvas.getContext('2d');
            pCanvas.width = 12; pCanvas.height = 12;
            pCtx.strokeStyle = "rgba(0,0,0,0.3)"; pCtx.lineWidth = 1;
            pCtx.beginPath(); pCtx.moveTo(0, 0); pCtx.lineTo(12, 12);
            pCtx.moveTo(12, 0); pCtx.lineTo(0, 12); pCtx.stroke();
            return pCanvas;
        }

        function drawRange(ctx, centerX, centerY, maxRadius, startPer, endPer, color, isGrid = false) {
            const innerR = maxRadius * (startPer / 100);
            const outerR = maxRadius * (endPer / 100);
            ctx.beginPath(); ctx.arc(centerX, centerY, outerR, 0, Math.PI * 2);
            ctx.arc(centerX, centerY, innerR, 0, Math.PI * 2, true);
            ctx.fillStyle = color; ctx.fill();
            if (isGrid) {
                const gridPattern = ctx.createPattern(createGridPattern(), 'repeat');
                ctx.fillStyle = gridPattern; ctx.fill();
            }
        }

        function drawDynamicCircles() {
            const canvas = document.getElementById('layer-canvas');
            const ctx = canvas.getContext('2d');
            if(!ctx) return; ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!isRunning || currentIsA) return;
            const centerX = canvas.width / 2; const centerY = canvas.height / 2;
            const maxRadius = 120; // コンテナサイズ縮小に合わせて調整
            const yellowColor = "#FFEB3B"; const safeGreen = "#E8F5E9";
            ctx.beginPath(); ctx.arc(centerX, centerY, maxRadius, 0, Math.PI * 2);
            ctx.fillStyle = safeGreen; ctx.fill();

            if (currentSoundType === 'A') {
                drawRange(ctx, centerX, centerY, maxRadius, 0, 15, yellowColor); 
                drawRange(ctx, centerX, centerY, maxRadius, 30, 50, yellowColor, true); 
                drawRange(ctx, centerX, centerY, maxRadius, 65, 80, yellowColor); 
            } else if (currentSoundType === 'B') {
                drawRange(ctx, centerX, centerY, maxRadius, 20, 35, yellowColor); 
                drawRange(ctx, centerX, centerY, maxRadius, 50, 65, yellowColor); 
                drawRange(ctx, centerX, centerY, maxRadius, 80, 95, yellowColor); 
            } else if (currentSoundType === 'C') {
                drawRange(ctx, centerX, centerY, maxRadius, 35, 65, yellowColor); 
                drawRange(ctx, centerX, centerY, maxRadius, 90, 100, yellowColor); 
            }
            ctx.beginPath(); ctx.arc(centerX, centerY, maxRadius * 0.15, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(0,0,0,0.6)"; ctx.lineWidth = 2; ctx.stroke();
            drawRange(ctx, centerX, centerY, maxRadius, 30, 50, "rgba(0,0,0,0.04)", true);
            ctx.beginPath(); ctx.arc(centerX, centerY, maxRadius, 0, Math.PI * 2);
            ctx.strokeStyle = "black"; ctx.lineWidth = 3; ctx.stroke();
        }

        function updateUI() {
            const timerEl = document.getElementById('timer-text');
            timerEl.innerText = (isRunning && timeLeft > 0) ? Math.ceil(timeLeft) : "0";
            if (isRunning && timeLeft > 0 && timeLeft <= 5) { timerEl.classList.add('pulse'); } 
            else { timerEl.classList.remove('pulse'); }
            document.getElementById('safety-text').innerText = safetyText;
            if (isRunning && currentIsA) { document.body.classList.add("stripe-bg"); } 
            else { document.body.classList.remove("stripe-bg"); }
            drawDynamicCircles();
        }

        function resetAll() {
            if (wakeLock !== null) { wakeLock.release().then(() => wakeLock = null); }
            clearInterval(timerId); isRunning = false; timeLeft = 0; safetyText = ""; 
            document.getElementById('step-counter').innerText = "";
            allAudios.forEach(a => { a.pause(); a.currentTime = 0; });
            updateUI();
        }

        function startTimer(startWithA, isFirst) {
            resetAll(); isRunning = true; currentIsA = startWithA; currentSoundType = "G";
            let firstStep = isFirst; let seqIdx = 0;
            const grandSeq = [22.25, 24, 22.75, 24, 22.5, 23.25, 23.5, 23.5, 23.25, 24, 22.5];
            const runCycle = () => {
                let duration;
                if (firstStep) { duration = 6; firstStep = false; document.getElementById('step-counter').innerText = "グランド: 1 / 12回目"; } 
                else { duration = grandSeq[seqIdx]; document.getElementById('step-counter').innerText = "グランド: " + (seqIdx + 2) + " / 12回目"; seqIdx = (seqIdx + 1) % grandSeq.length; }
                timeLeft = duration; let warningPlayed = false;
                timerId = setInterval(() => {
                    timeLeft -= 0.016;
                    if (timeLeft <= 5 && !warningPlayed) { currentIsA ? audioAka.play() : audioKiiro.play(); warningPlayed = true; }
                    if (timeLeft <= 0) { clearInterval(timerId); currentIsA = !currentIsA; runCycle(); }
                    updateUI();
                }, 16);
            };
            runCycle();
        }

        function startGrandForgotTimer(startWithA) {
            resetAll(); isRunning = true; currentIsA = startWithA; currentSoundType = "G";
            let isFirstStep = true;
            const runCycle = () => {
                document.getElementById('step-counter').innerText = "グランド同期中";
                timeLeft = isFirstStep ? 20.5 : 23; isFirstStep = false;
                let warningPlayed = false;
                timerId = setInterval(() => {
                    timeLeft -= 0.016;
                    if (timeLeft <= 5 && !warningPlayed) { currentIsA ? audioAka.play() : audioKiiro.play(); warningPlayed = true; }
                    if (timeLeft <= 0) { clearInterval(timerId); currentIsA = !currentIsA; runCycle(); }
                    updateUI();
                }, 16);
            };
            runCycle();
        }

        function startCircleCalamityTimer() {
            resetAll(); isRunning = true; currentIsA = false; 
            const sequence = [
                {t:21, s:'A', m:'線上安置'}, {t:23.75, s:'A', m:'線上安置'}, {t:21, s:'B', m:'金網安置'},
                {t:23, s:'A', m:'線上安置'}, {t:20.50, s:'C', m:'外周真ん中安置'}, {t:25.50, s:'B', m:'金網安置'}
            ];
            let idx = 0; let isFirstAction = true;
            const runCircleStep = () => {
                let step = sequence[idx]; currentSoundType = step.s; 
                document.getElementById('step-counter').innerText = "サークル: " + (idx + 1) + " / 6回目";
                timeLeft = (isFirstAction) ? 5 : step.t; safetyText = step.m;
                let warningPlayed = false;
                timerId = setInterval(() => {
                    timeLeft -= 0.016;
                    if (timeLeft <= 5 && !warningPlayed) {
                        if(step.s === 'A') audioA.play(); if(step.s === 'B') audioB.play(); if(step.s === 'C') audioC.play();
                        warningPlayed = true;
                    }
                    if (timeLeft <= 0) { clearInterval(timerId); isFirstAction = false; idx = (idx + 1) % sequence.length; runCircleStep(); }
                    updateUI();
                }, 16);
            };
            runCircleStep();
        }

        function startCircleForgotTimer() {
            resetAll(); isRunning = true; currentIsA = false; currentSoundType = "G";
            let isFirstCycle = true;
            const runCycle = () => {
                document.getElementById('step-counter').innerText = "サークル同期中";
                timeLeft = isFirstCycle ? 20 : 22.5; isFirstCycle = false;
                let warningPlayed = false;
                timerId = setInterval(() => {
                    timeLeft -= 0.016;
                    if (timeLeft <= 5 && !warningPlayed) { audioKiiro.play(); warningPlayed = true; }
                    if (timeLeft <= 0) { clearInterval(timerId); runCycle(); }
                    updateUI();
                }, 16);
            };
            runCycle();
        }
    </script>
</body>
</html>
